- name: Konfigurasi Full Stack Analisis Player Esport
  hosts: localhost
  connection: local
  become: yes
  tasks:

    # ==========================================
    # BAGIAN 1: DATABASE (MySQL)
    # ==========================================
    - name: Setup Database
      block:
        - name: Install MySQL Server
          apt:
            name: mysql-server
            state: present
            update_cache: yes
        
        - name: Konfigurasi Akses Remote MySQL
          lineinfile:
            path: /etc/mysql/mysql.conf.d/mysqld.cnf
            regexp: '^bind-address'
            line: 'bind-address = 0.0.0.0'
            
        - name: Setup Database, User, dan Tabel Esport
          shell: |
            mysql -e "CREATE DATABASE IF NOT EXISTS db_esport;"
            mysql -e "CREATE USER IF NOT EXISTS 'admin_esport'@'%' IDENTIFIED BY 'password123';"
            mysql -e "ALTER USER 'admin_esport'@'%' IDENTIFIED WITH mysql_native_password BY 'password123';"
            mysql -e "GRANT ALL PRIVILEGES ON db_esport.* TO 'admin_esport'@'%';"
            mysql -e "USE db_esport; CREATE TABLE IF NOT EXISTS performa_player (
              id INT AUTO_INCREMENT PRIMARY KEY,
              name VARCHAR(100), role VARCHAR(50), team VARCHAR(100), matchId VARCHAR(50),
              kills INT, assists INT, deaths INT, kda FLOAT, gold INT,
              teamKills INT, teamDeaths INT, minutes INT, seconds INT,
              performance FLOAT, participation FLOAT, goldPerMin FLOAT
            );"
            mysql -e "FLUSH PRIVILEGES;"
            
        - name: Restart MySQL
          service:
            name: mysql
            state: restarted
      when: target_node == 'database'

    # ==========================================
    # BAGIAN 2: BACKEND (Python Flask + API)
    # ==========================================
    - name: Setup Backend API
      block:
        - name: Install Python Libs
          apt:
            name: ['python3-pip', 'python3-flask', 'python3-flask-cors', 'python3-mysqldb']
            state: present
            
        - name: Deploy Source Code App.py
          copy:
            dest: "/home/vagrant/app.py"
            content: |
              from flask import Flask, request, jsonify
              from flask_cors import CORS
              import MySQLdb
              import MySQLdb.cursors

              app = Flask(__name__)
              CORS(app)

              def get_db():
                  return MySQLdb.connect(host="192.168.56.11", user="admin_esport", passwd="password123", db="db_esport", cursorclass=MySQLdb.cursors.DictCursor)

              @app.route('/api/performa', methods=['POST'])
              def add():
                  d = request.json
                  db = get_db()
                  cur = db.cursor()
                  cur.execute("""
                      INSERT INTO performa_player 
                      (name, role, team, matchId, kills, assists, deaths, kda, gold, teamKills, teamDeaths, minutes, seconds, performance, participation, goldPerMin) 
                      VALUES (%s, %s, %s, %s, %s, %s, %s, %s, %s, %s, %s, %s, %s, %s, %s, %s)
                  """, (d['name'], d['role'], d['team'], d['matchId'], d['kills'], d['assists'], d['deaths'], d['kda'], d['gold'], d['teamKills'], d['teamDeaths'], d['minutes'], d['seconds'], d['performance'], d['participation'], d['goldPerMin']))
                  db.commit()
                  db.close()
                  return jsonify({"status": "sukses"})

              @app.route('/api/performa', methods=['GET'])
              def get_all():
                  db = get_db()
                  cur = db.cursor()
                  cur.execute("SELECT * FROM performa_player ORDER BY id DESC")
                  res = cur.fetchall()
                  db.close()
                  return jsonify(res)

              if __name__ == '__main__':
                  app.run(host='0.0.0.0', port=5000)

        - name: Create Systemd Service for Backend
          copy:
            dest: "/etc/systemd/system/backend-esport.service"
            content: |
              [Unit]
              Description=Flask Backend Esport API
              After=network.target

              [Service]
              User=vagrant
              WorkingDirectory=/home/vagrant
              ExecStart=/usr/bin/python3 /home/vagrant/app.py
              Restart=always

              [Install]
              WantedBy=multi-user.target
              
        - name: Start Backend Service
          systemd:
            name: backend-esport
            daemon_reload: yes
            enabled: yes
            state: restarted
      when: target_node == 'backend'

    # ==========================================
    # BAGIAN 3: FRONTEND (Nginx Dashboard)
    # ==========================================
    - name: Setup Web Dashboard
      block:
        - name: Install Nginx
          apt:
            name: nginx
            state: present
            
        - name: Deploy Dashboard HTML dengan Integrasi API Fetch
          copy:
            dest: "/var/www/html/index.html"
            content: |
              <!DOCTYPE html>
              <html lang="id" data-theme="light">
              <head>
                <meta charset="UTF-8" />
                <meta name="viewport" content="width=device-width, initial-scale=1.0" />
                <title>Dashboard Analisis Player Esport</title>
                <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=cabinet-grotesk@500,700&display=swap" rel="stylesheet">
                <style>
                  :root {
                    --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
                    --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
                    --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
                    --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
                    --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2rem);
                    --space-2: .5rem; --space-3: .75rem; --space-4: 1rem; --space-6: 1.5rem; --space-8: 2rem;
                    --radius-md: .75rem; --radius-lg: 1rem; --shadow: 0 10px 30px rgba(0,0,0,.08);
                    --bg: #f7f6f2; --surface:#ffffff; --surface-2:#f1f5f9; --text:#16202a; --muted:#64748b; --primary:#01696f; --accent:#0ea5a4; --border:#d7dee6; --danger:#b91c1c; --success:#166534;
                  }
                  [data-theme="dark"] { --bg:#0f1720; --surface:#111827; --surface-2:#1f2937; --text:#e5eef7; --muted:#94a3b8; --border:#334155; --primary:#4fd1c5; --accent:#2dd4bf; }
                  * { box-sizing:border-box; }
                  body { margin:0; font-family:'Satoshi',sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
                  .wrap { max-width:1200px; margin:0 auto; padding:var(--space-6); }
                  header { display:flex; justify-content:space-between; align-items:center; gap:var(--space-4); margin-bottom:var(--space-6); }
                  .logo { display:flex; align-items:center; gap:.75rem; }
                  .logo-mark { width:42px; height:42px; border-radius:12px; background:linear-gradient(135deg,var(--primary),var(--accent)); }
                  h1,h2,h3 { margin:0; font-family:'Cabinet Grotesk',sans-serif; }
                  h1 { font-size:var(--text-xl); }
                  .sub { color:var(--muted); font-size:var(--text-sm); }
                  .theme-toggle { border:1px solid var(--border); background:var(--surface); border-radius:999px; padding:.6rem .9rem; color:var(--text); }
                  .grid { display:grid; gap:var(--space-6); }
                  .stats { grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); }
                  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow); padding:var(--space-6); }
                  .stat-label { color:var(--muted); font-size:var(--text-sm); }
                  .stat-value { font-size:clamp(1.8rem,1.5rem + 1.5vw,2.6rem); font-weight:700; margin-top:.25rem; }
                  .two-col { grid-template-columns:1fr 1fr; }
                  label { display:block; font-size:var(--text-sm); margin-bottom:.35rem; color:var(--muted); }
                  input { width:100%; padding:.85rem 1rem; border-radius:var(--radius-md); border:1px solid var(--border); background:var(--surface-2); color:var(--text); }
                  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-4); }
                  .actions { display:flex; gap:var(--space-3); margin-top:var(--space-4); flex-wrap:wrap; }
                  button { border:none; border-radius:999px; padding:.85rem 1.15rem; font-weight:700; cursor:pointer; }
                  .primary { background:var(--primary); color:white; }
                  .secondary { background:var(--surface-2); color:var(--text); border:1px solid var(--border); }
                  .note { font-size:var(--text-xs); color:var(--muted); margin-top:var(--space-3); }
                  table { width:100%; border-collapse:collapse; font-size:var(--text-sm); }
                  th, td { padding:.85rem .75rem; border-bottom:1px solid var(--border); text-align:left; }
                  th { color:var(--muted); font-weight:700; }
                  .badge { display:inline-block; padding:.3rem .7rem; border-radius:999px; font-size:var(--text-xs); font-weight:700; }
                  .high { background:rgba(22,101,52,.14); color:var(--success); }
                  .mid { background:rgba(202,138,4,.14); color:#a16207; }
                  .low { background:rgba(185,28,28,.14); color:var(--danger); }
                  .section-title { margin-bottom:var(--space-4); }
                  @media (max-width: 900px){ .two-col,.form-grid{grid-template-columns:1fr;} header{align-items:flex-start; flex-direction:column;} }
                </style>
              </head>
              <body>
                <div class="wrap">
                  <header>
                    <div>
                      <div class="logo">
                        <div class="logo-mark"></div>
                        <div>
                          <h1>Dashboard Analisis Player Esport</h1>
                          <div class="sub">Satu halaman untuk input data, hitung performa, dan dukung keputusan manajemen berbasis data.</div>
                        </div>
                      </div>
                    </div>
                    <button class="theme-toggle" id="themeToggle">Mode Gelap/Terang</button>
                  </header>

                  <section class="grid stats">
                    <div class="card"><div class="stat-label">Jumlah Player</div><div class="stat-value" id="totalPlayers">0</div></div>
                    <div class="card"><div class="stat-label">Rata-rata Performance</div><div class="stat-value" id="avgPerf">0</div></div>
                    <div class="card"><div class="stat-label">Performance Tertinggi</div><div class="stat-value" id="maxPerf">0</div></div>
                    <div class="card"><div class="stat-label">Rekomendasi Lanjut Kontrak</div><div class="stat-value" id="keepCount">0</div></div>
                  </section>

                  <section class="grid two-col" style="margin-top:2rem;">
                    <div class="card">
                      <h2 class="section-title">Form Input Player</h2>
                      <div class="form-grid">
                        <div><label>Nama Player</label><input id="playerName" placeholder="Contoh: Algina" /></div>
                        <div><label>Role</label><input id="playerRole" placeholder="Contoh: Jungler" /></div>
                        <div><label>Tim</label><input id="playerTeam" placeholder="Contoh: Telkom" /></div>
                        <div><label>ID Match</label><input id="matchId" placeholder="Contoh: 101" /></div>
                      </div>
                      <p class="note">Data identitas dari pemain.</p>
                    </div>

                    <div class="card">
                      <h2 class="section-title">Form Input Data Game</h2>
                      <div class="form-grid">
                        <div><label>Kills</label><input id="kills" type="number" min="0" value="8" /></div>
                        <div><label>Assists</label><input id="assists" type="number" min="0" value="10" /></div>
                        <div><label>Deaths</label><input id="deaths" type="number" min="0" value="2" /></div>
                        <div><label>KDA</label><input id="kda" type="number" step="0.01" min="0" value="9" /></div>
                        <div><label>Gold</label><input id="gold" type="number" min="0" value="14500" /></div>
                        <div><label>Team Kills</label><input id="teamKills" type="number" min="0" value="24" /></div>
                        <div><label>Team Deaths</label><input id="teamDeaths" type="number" min="0" value="12" /></div>
                        <div><label>Menit</label><input id="minutes" type="number" min="0" value="16" /></div>
                        <div><label>Detik</label><input id="seconds" type="number" min="0" max="59" value="45" /></div>
                      </div>
                      <div class="actions">
                        <button class="primary" id="saveBtn">Save</button>
                        <button class="secondary" id="demoBtn">Isi Data Demo</button>
                        <button class="secondary" id="resetBtn">Reset</button>
                      </div>
                      <p class="note">Data akan dikirim ke Backend API dan disimpan di MySQL Database secara real-time.</p>
                    </div>
                  </section>

                  <section class="card" style="margin-top:2rem;">
                    <h2 class="section-title">Tabel Performa Player (Data Server)</h2>
                    <table>
                      <thead>
                        <tr>
                          <th>Player</th><th>Role</th><th>Team</th><th>Match</th><th>KDA</th><th>Gold/Min</th><th>Participation</th><th>Performance</th><th>Keputusan</th>
                        </tr>
                      </thead>
                      <tbody id="tableBody"></tbody>
                    </table>
                  </section>
                </div>

              <script>
              const API_URL = 'http://192.168.56.10:5000/api/performa';
              let state = [];
              const $ = (id) => document.getElementById(id);

              function calculatePerformance(d){
                const duration = Math.max((Number(d.minutes) * 60) + Number(d.seconds), 60);
                const goldPerMin = Number(d.gold) / (duration / 60);
                const participation = ((Number(d.kills) + Number(d.assists)) / Math.max(Number(d.teamKills),1)) * 100;
                const survival = Math.max(0, 100 - (Number(d.deaths) * 12));
                const kdaScore = Math.min(Number(d.kda) * 10, 100);
                const impact = Math.min((((Number(d.kills) * 2) + Number(d.assists)) / Math.max(Number(d.teamKills),1)) * 100, 100);
                const economy = Math.min((goldPerMin / 900) * 100, 100);
                const performance = (0.25 * kdaScore) + (0.2 * impact) + (0.2 * participation) + (0.2 * survival) + (0.15 * economy);
                return { performance: performance.toFixed(2), participation: participation.toFixed(2), goldPerMin: goldPerMin.toFixed(2) };
              }
              function decision(score){ return score >= 75 ? 'Lanjut Kontrak' : score >= 60 ? 'Evaluasi Lanjutan' : 'Pertimbangkan Pemutusan'; }
              function badgeClass(score){ return score >= 75 ? 'high' : score >= 60 ? 'mid' : 'low'; }

              function render(){
                const tbody = $('tableBody'); tbody.innerHTML = '';
                state.forEach(row => {
                  const tr = document.createElement('tr');
                  tr.innerHTML = `<td>${row.name}</td><td>${row.role}</td><td>${row.team}</td><td>${row.matchId}</td><td>${row.kda}</td><td>${row.goldPerMin}</td><td>${row.participation}%</td><td><span class="badge ${badgeClass(Number(row.performance))}">${row.performance}</span></td><td>${decision(Number(row.performance))}</td>`;
                  tbody.appendChild(tr);
                });
                $('totalPlayers').textContent = state.length;
                const scores = state.map(x => Number(x.performance));
                $('avgPerf').textContent = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(2) : '0';
                $('maxPerf').textContent = scores.length ? Math.max(...scores).toFixed(2) : '0';
                $('keepCount').textContent = scores.filter(s => s >= 75).length;
              }

              async function loadData() {
                try {
                  const res = await fetch(API_URL);
                  state = await res.json();
                  render();
                } catch(e) {
                  console.error("Gagal koneksi ke API", e);
                }
              }

              async function saveData(){
                const data = {
                  name: $('playerName').value || 'Tanpa Nama', role: $('playerRole').value || '-', team: $('playerTeam').value || '-', matchId: $('matchId').value || '-',
                  kills: $('kills').value, assists: $('assists').value, deaths: $('deaths').value, kda: $('kda').value, gold: $('gold').value,
                  teamKills: $('teamKills').value, teamDeaths: $('teamDeaths').value, minutes: $('minutes').value, seconds: $('seconds').value
                };
                const calc = calculatePerformance(data);
                const payload = { ...data, ...calc };

                try {
                  await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                  });
                  loadData();
                  alert("Berhasil disimpan ke Database!");
                } catch(e) {
                  alert("Gagal koneksi server!");
                }
              }

              $('saveBtn').addEventListener('click', saveData);
              $('demoBtn').addEventListener('click', ()=>{
                $('playerName').value='Razes'; $('playerRole').value='Jungler'; $('playerTeam').value='Tel-U Esport'; $('matchId').value='MATCH-001';
                $('kills').value=9; $('assists').value=11; $('deaths').value=2; $('kda').value=10; $('gold').value=15200; $('teamKills').value=26; $('teamDeaths').value=13; $('minutes').value=17; $('seconds').value=10;
              });
              $('resetBtn').addEventListener('click', ()=>{ document.querySelectorAll('input').forEach((el,i)=>{ if(el.type==='number'){ el.value = el.defaultValue || 0; } else { el.value=''; } }); });
              
              document.getElementById('themeToggle').addEventListener('click', ()=>{
                const html = document.documentElement; html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
              });

              loadData();
              </script>
              </body>
              </html>
      when: target_node == 'frontend'
